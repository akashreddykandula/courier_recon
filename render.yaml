services:
  - type: keyvalue
    name: courier-recon-redis
    ipAllowList: []

  - type: web
    name: courier-recon-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start --workspace backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: courier-recon-redis
          property: connectionString
      - key: NOTIFICATION_WEBHOOK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: worker
    name: courier-recon-worker
    runtime: node
    buildCommand: npm install
    startCommand: cd backend && npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: courier-recon-redis
          property: connectionString
      - key: NOTIFICATION_WEBHOOK_URL
        sync: false

  - type: web
    name: courier-recon-frontend
    runtime: static
    buildCommand: npm install && npm run build --workspace frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
